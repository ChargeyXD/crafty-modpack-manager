version: "3.8"

services:
  crafty-modpack-manager:
    image: chargeyxd/crafty-modpack-manager:latest
    build: .
    container_name: crafty-modpack-manager
    restart: unless-stopped
    ports:
      - "7800:7800"
    environment:
      # Your CurseForge API key — get one at https://console.curseforge.com
      - CURSEFORGE_API_KEY=${CURSEFORGE_API_KEY}
      # Crafty base URL — internal LAN address or Cloudflare tunnel
      - CRAFTY_URL=${CRAFTY_URL:-https://192.168.68.120:8443}
      # Crafty Bearer token (JWT)
      - CRAFTY_TOKEN=${CRAFTY_TOKEN}
      # Verify Crafty TLS cert? Set false for self-signed (local setup)
      - CRAFTY_VERIFY_SSL=${CRAFTY_VERIFY_SSL:-false}
      # Default min/max RAM in GB applied to new servers
      - DEFAULT_MEM_MIN=${DEFAULT_MEM_MIN:-2}
      - DEFAULT_MEM_MAX=${DEFAULT_MEM_MAX:-6}
      # Base port for new servers — increments automatically per server
      - BASE_SERVER_PORT=${BASE_SERVER_PORT:-25565}

x-casaos:
  architectures:
    - amd64
    - arm64
  main: crafty-modpack-manager
  author: ChargeyXD
  category: Games
  description:
    en_us: Browse CurseForge Minecraft modpacks and deploy them directly as Crafty Controller server instances from a Shockbyte-style web UI.
  developer: ChargeyXD
  icon: https://raw.githubusercontent.com/ChargeyXD/crafty-modpack-manager/main/assets/icon.png
  index: /
  port_map: "7800"
  scheme: http
  store_app_id: crafty-modpack-manager
  tagline:
    en_us: One-click Minecraft modpack server deployment
  thumbnail: https://raw.githubusercontent.com/ChargeyXD/crafty-modpack-manager/main/assets/icon.png
  title:
    en_us: Crafty Modpack Manager
  tips:
    before_install:
      en_us: |
        You need:
        1. A CurseForge API key from https://console.curseforge.com
        2. Your Crafty Controller JWT token (Settings → API Tokens)
        3. Crafty URL reachable from this container (LAN IP or Cloudflare tunnel)
