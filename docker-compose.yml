version: "3.8"

services:
  crafty-modpack-manager:
    image: ghcr.io/chargeyxd/crafty-modpack-manager:latest
    build: .
    container_name: crafty-modpack-manager
    restart: unless-stopped
    ports:
      - "7800:7800"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      # ── Required ──────────────────────────────────────────────────────────
      # CurseForge API key — get free key at https://console.curseforge.com
      - CURSEFORGE_API_KEY=
      # Crafty JWT token — Crafty UI ▸ Settings ▸ API Tokens
      - CRAFTY_TOKEN=
      # Crafty base URL (LAN IP or Cloudflare tunnel hostname)
      - CRAFTY_URL=https://192.168.68.120:8443

      # ── Optional (defaults shown) ──────────────────────────────────────
      # Set to false when Crafty uses a self-signed TLS cert (default for local installs)
      - CRAFTY_VERIFY_SSL=false
      # Default RAM allocated to new servers (GB)
      - DEFAULT_MEM_MIN=2
      - DEFAULT_MEM_MAX=6
      # Starting port for new Minecraft servers
      - BASE_SERVER_PORT=25565
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7800/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

x-casaos:
  architectures:
    - amd64
    - arm64
  main: crafty-modpack-manager
  author: ChargeyXD
  category: Games
  description:
    en_us: Browse CurseForge Minecraft modpacks and deploy them as Crafty Controller server instances — like Shockbyte, self-hosted.
  developer: ChargeyXD
  icon: https://raw.githubusercontent.com/ChargeyXD/crafty-modpack-manager/main/assets/icon.png
  index: /
  port_map: "7800"
  scheme: http
  store_app_id: crafty-modpack-manager
  tagline:
    en_us: One-click Minecraft modpack server deployment
  title:
    en_us: Crafty Modpack Manager
  tips:
    before_install:
      en_us: |
        Fill in these 2 required environment variables before installing:
        • CURSEFORGE_API_KEY — free key at https://console.curseforge.com
        • CRAFTY_TOKEN       — Crafty UI ▸ Settings ▸ API Tokens
        CRAFTY_URL defaults to https://192.168.68.120:8443 — change if yours differs.
