version: "3.9"
services:
  crafty-modpack-manager:
    build: .
    image: chargeyxd/crafty-modpack-manager:latest
    container_name: crafty-modpack-manager
    restart: unless-stopped
    ports:
      - "7800:7800"
    environment:
      - CRAFTY_URL=https://192.168.68.120:8443
      - CRAFTY_API_TOKEN=REPLACE_WITH_YOUR_CRAFTY_TOKEN
      - CURSEFORGE_API_KEY=REPLACE_WITH_YOUR_CURSEFORGE_KEY
    extra_hosts:
      - "host.docker.internal:host-gateway"
    x-casaos:
      author: ChargeyXD
      category: Games
      description:
        en_us: Browse CurseForge modpacks and deploy them as Crafty Controller server instances with one click. Like Shockbyte, but self-hosted on your CasaOS server.
      icon: https://raw.githubusercontent.com/ChargeyXD/crafty-modpack-manager/main/frontend/icon.svg
      index: /
      is_uncontrolled: false
      port_map: "7800"
      scheme: http
      store_app_id: crafty-modpack-manager
      title:
        en_us: Crafty Modpack Manager
