<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Crafty Modpack Manager</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
  :root {
    --bg:#171614; --sur:#1c1b19; --sur2:#201f1d; --suroff:#252421;
    --bdr:#393836; --txt:#cdccca; --muted:#8c8a86; --faint:#5a5957;
    --pri:#4f98a3; --pri-hov:#227f8b; --pri-act:#1a626b;
    --grn:#6daa45; --red:#dd6974; --org:#fdab43;
    --radius:14px; --rcard:18px; --rbig:22px;
    --shadow:0 8px 32px rgba(0,0,0,.35);
    --font:'Satoshi',system-ui,sans-serif;
    --trans:180ms cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100dvh;font-size:16px;-webkit-font-smoothing:antialiased}
  button{cursor:pointer;font-family:inherit}
  input,select{font-family:inherit}
  img{display:block;max-width:100%}
  .app{display:grid;grid-template-columns:300px 1fr;min-height:100dvh}
  .sidebar{background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:sticky;top:0;height:100dvh;overflow-y:auto}
  .main{display:flex;flex-direction:column;overflow:hidden}
  .sb-header{padding:20px;border-bottom:1px solid var(--bdr)}
  .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--pri),#7db5bc);display:grid;place-items:center;flex-shrink:0}
  .logo svg{width:20px;height:20px}
  .app-name{font-size:1.05rem;font-weight:700;line-height:1.2}
  .app-sub{font-size:.8rem;color:var(--muted)}
  .sb-section{padding:16px;border-bottom:1px solid var(--bdr)}
  .sb-section h4{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-bottom:12px}
  .form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
  .form-row label{font-size:.83rem;color:var(--muted)}
  .input,.select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--bdr);background:var(--sur2);color:var(--txt);font-size:.9rem;outline:none;transition:border-color var(--trans)}
  .input:focus,.select:focus{border-color:var(--pri)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:10px;border:none;font-weight:600;font-size:.9rem;transition:background var(--trans),transform var(--trans);white-space:nowrap}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--pri);color:#0f1720}
  .btn-primary:hover{background:var(--pri-hov)}
  .btn-secondary{background:var(--sur2);color:var(--txt);border:1px solid var(--bdr)}
  .btn-secondary:hover{background:var(--suroff)}
  .btn-full{width:100%}
  .btn-sm{padding:7px 12px;font-size:.82rem;border-radius:8px}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
  .dot-ok{background:var(--grn)} .dot-err{background:var(--red)} .dot-idle{background:var(--faint)}
  .status-row{display:flex;align-items:center;gap:8px;font-size:.85rem;padding:6px 0}
  .status-row span{color:var(--muted)}
  .server-item{padding:10px 12px;border-radius:10px;background:var(--sur2);border:1px solid var(--bdr);margin-bottom:8px}
  .server-name{font-weight:600;font-size:.9rem;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .server-meta{font-size:.78rem;color:var(--muted);margin-bottom:8px}
  .server-actions{display:flex;gap:6px;flex-wrap:wrap}
  .empty-state{text-align:center;padding:20px 0;color:var(--faint);font-size:.85rem}
  .topbar{padding:16px 24px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .topbar-title{font-size:1.15rem;font-weight:700;flex:1}
  .search-bar{display:flex;gap:8px;flex:1;min-width:200px}
  .search-bar .input{flex:1}
  .page-ctrls{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--muted)}
  .catalog{flex:1;overflow-y:auto;padding:20px 24px}
  .catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
  .pack-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rcard);overflow:hidden;display:flex;flex-direction:column;transition:border-color var(--trans),box-shadow var(--trans)}
  .pack-card:hover{border-color:var(--pri);box-shadow:0 0 0 2px rgba(79,152,163,.15)}
  .pack-thumb{aspect-ratio:16/9;object-fit:cover;width:100%;background:var(--suroff)}
  .pack-thumb-placeholder{aspect-ratio:16/9;background:linear-gradient(135deg,var(--suroff),var(--sur2));display:grid;place-items:center}
  .pack-thumb-placeholder svg{width:36px;height:36px;opacity:.3}
  .pack-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
  .pack-badges{display:flex;gap:6px;flex-wrap:wrap}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:.75rem;font-weight:700}
  .badge-loader{background:rgba(79,152,163,.18);color:var(--pri)}
  .badge-ver{background:rgba(255,255,255,.07);color:var(--muted)}
  .badge-server{background:rgba(109,170,69,.18);color:#6daa45}
  .pack-title{font-weight:700;font-size:1rem;line-height:1.3}
  .pack-summary{font-size:.83rem;color:var(--muted);line-height:1.5;flex:1}
  .pack-footer{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
  .pack-dl{font-size:.78rem;color:var(--faint)}
  .shimmer{background:linear-gradient(90deg,var(--sur) 25%,var(--suroff) 50%,var(--sur) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:10px}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}
  .modal-backdrop.open{display:flex}
  .modal{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rbig);padding:24px;width:min(680px,100%);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:18px;max-height:90dvh;overflow-y:auto}
  .modal-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .modal-title{font-size:1.25rem;font-weight:700;line-height:1.3}
  .modal-sub{font-size:.85rem;color:var(--muted);margin-top:4px}
  .close-btn{width:32px;height:32px;border-radius:8px;background:var(--sur2);border:1px solid var(--bdr);color:var(--muted);font-size:1.1rem;display:grid;place-items:center;flex-shrink:0}
  .close-btn:hover{background:var(--suroff)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-grid .span2{grid-column:span 2}
  .form-divider{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);padding:4px 0;border-top:1px solid var(--bdr)}
  .modal-footer{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
  .file-hint{font-size:.78rem;color:var(--muted);margin-top:4px}
  .file-hint.server-pack-hint{color:var(--grn);font-weight:600}
  .toast-stack{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:200}
  .toast{padding:12px 18px;border-radius:12px;font-size:.9rem;font-weight:500;box-shadow:var(--shadow);animation:toastIn .25s ease;max-width:360px;transition:opacity .4s}
  .toast-ok{background:#1e3518;border:1px solid var(--grn);color:#b7f49b}
  .toast-err{background:#3a1a1e;border:1px solid var(--red);color:#fbb4bb}
  .toast-info{background:var(--sur);border:1px solid var(--bdr);color:var(--txt)}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .spin{animation:spin .8s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  .progress-bar-wrap{height:4px;background:var(--bdr);border-radius:999px;overflow:hidden;margin-top:4px}
  .progress-bar{height:100%;background:var(--pri);width:0%;transition:width .4s ease;border-radius:999px}
  .faint{color:var(--faint)} .text-ok{color:var(--grn)} .text-err{color:var(--red)}
  @media(max-width:860px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.form-grid{grid-template-columns:1fr}.form-grid .span2{grid-column:span 1}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-header">
      <div class="logo-row">
        <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8l3 3-3 3"/><path d="M13 14h4"/></svg></div>
        <div><div class="app-name">Modpack Manager</div><div class="app-sub">Crafty + CurseForge</div></div>
      </div>
    </div>
    <div class="sb-section">
      <h4>System status</h4>
      <div class="status-row"><span class="dot dot-idle" id="craftyDot"></span><span>Crafty Controller</span><span id="craftyUrl" class="faint" style="margin-left:auto;font-size:.78rem;overflow:hidden;text-overflow:ellipsis;max-width:110px"></span></div>
      <div class="status-row"><span class="dot dot-idle" id="cfDot"></span><span>CurseForge API</span></div>
    </div>
    <div class="sb-section" style="flex:1;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h4 style="margin-bottom:0">Active servers</h4>
        <button class="btn btn-secondary btn-sm" onclick="loadServers()">&#8635; Refresh</button>
      </div>
      <div id="serversList"></div>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Browse Modpacks</span>
      <div class="search-bar">
        <input id="searchInput" class="input" placeholder="Search CurseForge modpacks&hellip;" style="min-width:180px"/>
        <input id="mcFilter" class="input" placeholder="MC version" style="width:120px"/>
        <button class="btn btn-primary" onclick="doSearch()" id="searchBtn">Search</button>
      </div>
      <div class="page-ctrls">
        <button class="btn btn-secondary btn-sm" id="prevPage" onclick="changePage(-1)" disabled>&larr; Prev</button>
        <span id="pageLabel">Page 1</span>
        <button class="btn btn-secondary btn-sm" id="nextPage" onclick="changePage(1)">Next &rarr;</button>
      </div>
    </div>
    <div class="catalog" id="catalog"><div class="catalog-grid" id="catalogGrid"></div></div>
  </div>
</div>

<!-- Install modal -->
<div class="modal-backdrop" id="installModal">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title" id="modalTitle">Install modpack</div><div class="modal-sub" id="modalSub"></div></div>
      <button class="close-btn" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="form-grid">
      <div class="form-row"><label>Server name</label><input id="iName" class="input" placeholder="My Modpack Server"/></div>
      <div class="form-row"><label>Port</label><input id="iPort" class="input" type="number" value="25565" min="1024" max="65535"/></div>
      <div class="form-row"><label>Minecraft version</label><input id="iMcVer" class="input" placeholder="e.g. 1.20.1" readonly/></div>
      <div class="form-row"><label>Mod loader</label>
        <select id="iLoader" class="select">
          <option value="forge-installer">Forge</option>
          <option value="fabric-installer">Fabric</option>
          <option value="neoforge-installer">NeoForge</option>
          <option value="quilt-installer">Quilt</option>
        </select>
      </div>
      <div class="form-row"><label>Min RAM (MB)</label><input id="iMinRam" class="input" type="number" value="2048" min="512" step="512"/></div>
      <div class="form-row"><label>Max RAM (MB)</label><input id="iMaxRam" class="input" type="number" value="6144" min="1024" step="512"/></div>
      <div class="form-row span2"><div class="form-divider">Select build / file</div></div>
      <div class="form-row span2">
        <label>Available files <span class="faint" style="font-size:.78rem">(server packs first, latest 50 shown)</span></label>
        <select id="iFile" class="select" onchange="onFileChange()" size="6" style="height:auto;border-radius:10px"></select>
        <div id="fileHint" class="file-hint"></div>
      </div>
    </div>
    <div id="progressWrap" style="display:none">
      <div style="font-size:.82rem;color:var(--muted);margin-bottom:6px" id="progressLabel">Waiting for Crafty&hellip;</div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="installBtn" onclick="doInstall()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        Install to Crafty
      </button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script>
/* -- state -- */
let currentPage = 0;
let activePack  = null;
let packFiles   = [];

/* -- utils -- */
function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toastStack').prepend(t);
  setTimeout(() => t.style.opacity = '0', 3500);
  setTimeout(() => t.remove(), 4000);
}

async function api(path, opts = {}) {
  const r = await fetch(path, opts);
  const j = await r.json();
  if (!r.ok) throw new Error(j.detail || j.error || `HTTP ${r.status}`);
  return (j && typeof j === 'object' && 'data' in j) ? j.data : j;
}

function setProgress(label, pct) {
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('progressBar').style.width = pct + '%';
}

/* -- status bar -- */
async function loadConfig() {
  try {
    const c = await api('/api/config');
    document.getElementById('craftyUrl').textContent =
      c.crafty_url.replace(/https?:\/\//, '');
    document.getElementById('cfDot').className =
      'dot ' + (c.curseforge_configured ? 'dot-ok' : 'dot-err');
  } catch(e) {}
  try {
    const h = await api('/health');
    document.getElementById('craftyDot').className =
      'dot ' + (h.crafty_reachable ? 'dot-ok' : 'dot-err');
  } catch(e) {
    document.getElementById('craftyDot').className = 'dot dot-err';
  }
}

/* -- server list -- */
async function loadServers() {
  const el = document.getElementById('serversList');
  el.innerHTML = '<div class="empty-state">Loading&hellip;</div>';
  try {
    const items = await api('/api/servers');
    const arr = Array.isArray(items) ? items : (items?.servers || []);
    if (!arr.length) {
      el.innerHTML = '<div class="empty-state">No servers in Crafty yet.</div>';
      return;
    }
    el.innerHTML = arr.map(s => {
      const id   = s.server_id || s.id || '';
      const name = s.server_name || s.name || 'Unnamed';
      const type = s.type || s.server_type || '';
      return `<div class="server-item">
        <div class="server-name" title="${name}">${name}</div>
        <div class="server-meta">${id ? 'ID: '+String(id).slice(0,8)+'&hellip;' : ''} ${type ? '&middot; '+type : ''}</div>
        <div class="server-actions">
          <button class="btn btn-secondary btn-sm" onclick="serverAction('${id}','start')">&#9654; Start</button>
          <button class="btn btn-secondary btn-sm" onclick="serverAction('${id}','stop')">&#9632; Stop</button>
          <button class="btn btn-secondary btn-sm" onclick="serverAction('${id}','restart')">&#8635; Restart</button>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty-state text-err">Could not reach Crafty.<br><span class="faint">${e.message}</span></div>`;
  }
}

async function serverAction(id, action) {
  if (!id) return;
  try {
    await api(`/api/servers/${id}/action/${action}`, { method: 'POST' });
    toast(`Server ${action} sent.`, 'ok');
    setTimeout(loadServers, 1200);
  } catch(e) {
    toast(`Action failed: ${e.message}`, 'err');
  }
}

/* -- catalog -- */
function renderSkeletons() {
  document.getElementById('catalogGrid').innerHTML = Array.from({length:8}).map(() =>
    `<div class="pack-card">
      <div class="shimmer" style="aspect-ratio:16/9;width:100%"></div>
      <div class="pack-body" style="gap:10px">
        <div class="shimmer" style="height:20px;width:60%"></div>
        <div class="shimmer" style="height:14px;width:100%"></div>
        <div class="shimmer" style="height:14px;width:80%"></div>
        <div class="shimmer" style="height:36px;width:100%;margin-top:8px"></div>
      </div>
    </div>`
  ).join('');
}

function fmtDl(n) {
  if (!n) return '0';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(0)+'K';
  return String(n);
}

async function doSearch(resetPage = true) {
  if (resetPage) currentPage = 0;
  const q  = document.getElementById('searchInput').value.trim();
  const mc = document.getElementById('mcFilter').value.trim();
  document.getElementById('pageLabel').textContent = `Page ${currentPage + 1}`;
  document.getElementById('prevPage').disabled = currentPage === 0;
  renderSkeletons();
  try {
    const packs = await api(
      `/api/modpacks/search?q=${encodeURIComponent(q)}&mc_version=${encodeURIComponent(mc)}&page=${currentPage}`
    );
    const list = Array.isArray(packs) ? packs : (packs?.data || []);
    document.getElementById('nextPage').disabled = list.length < 20;
    if (!list.length) {
      document.getElementById('catalogGrid').innerHTML =
        `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--faint)">No modpacks found.</div>`;
      return;
    }
    document.getElementById('catalogGrid').innerHTML = list.map(pack => {
      const img     = pack.logo?.thumbnailUrl || pack.logo?.url || '';
      const summary = (pack.summary || 'No description available.').slice(0, 130);
      const loader  = pack.latestFilesIndexes?.[0]?.modLoader || '';
      const mcVer   = pack.latestFilesIndexes?.[0]?.gameVersion || '';
      return `<div class="pack-card">
        ${img
          ? `<img class="pack-thumb" src="${img}" alt="" loading="lazy" width="300" height="169">`
          : `<div class="pack-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg></div>`
        }
        <div class="pack-body">
          <div class="pack-badges">
            ${loader ? `<span class="badge badge-loader">${loader}</span>` : ''}
            ${mcVer  ? `<span class="badge badge-ver">${mcVer}</span>`     : ''}
          </div>
          <div class="pack-title">${pack.name}</div>
          <div class="pack-summary">${summary}</div>
          <div class="pack-footer">
            <span class="pack-dl">&darr; ${fmtDl(pack.downloadCount)}</span>
            <button class="btn btn-primary btn-sm"
              onclick='openInstall(${pack.id}, ${JSON.stringify(pack.name)}, ${JSON.stringify(pack.summary||"")})'
            >Install &rarr;</button>
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('catalogGrid').innerHTML =
      `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--red)">Search failed: ${e.message}</div>`;
  }
}

function changePage(dir) {
  currentPage = Math.max(0, currentPage + dir);
  doSearch(false);
  document.getElementById('catalog').scrollTop = 0;
}

/* -- install modal -- */
async function openInstall(id, name, summary) {
  activePack = { id, name };
  document.getElementById('modalTitle').textContent = `Install: ${name}`;
  document.getElementById('modalSub').textContent   = (summary || '').slice(0, 180);
  document.getElementById('iName').value = name;
  document.getElementById('iFile').innerHTML = '<option disabled selected>Loading files&hellip;</option>';
  document.getElementById('fileHint').textContent = '';
  document.getElementById('fileHint').className = 'file-hint';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('installBtn').disabled = false;
  document.getElementById('installBtn').innerHTML =
    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12l7 7 7-7"/></svg> Install to Crafty';
  document.getElementById('installModal').classList.add('open');

  try {
    const files = await api(`/api/modpacks/${id}/files`);
    packFiles = Array.isArray(files) ? files : (files?.data || []);
    if (!packFiles.length) {
      document.getElementById('iFile').innerHTML =
        '<option value="" disabled>No installable files found</option>';
      return;
    }

    document.getElementById('iFile').innerHTML = packFiles.map(f => {
      const serverTag = f._is_server_pack ? ' ⭐ [Server Pack]' : '';
      return `<option value="${f.id}"
        data-mc="${f._mc_version || ''}"
        data-loader="${f._loader || 'forge-installer'}"
        data-server="${f._is_server_pack ? '1' : '0'}">
        ${f.displayName || f.fileName}${f._mc_version ? ' ['+f._mc_version+']' : ''}${serverTag}
      </option>`;
    }).join('');

    // Auto-select the first server pack if one exists, otherwise index 0
    const opts = document.getElementById('iFile').options;
    let best = 0;
    for (let i = 0; i < opts.length; i++) {
      if (opts[i].dataset.server === '1') { best = i; break; }
    }
    document.getElementById('iFile').selectedIndex = best;
    onFileChange();
  } catch(e) {
    document.getElementById('iFile').innerHTML =
      `<option disabled>Error loading files: ${e.message}</option>`;
  }
}

/**
 * Maps a raw mod loader string to the exact Crafty catalog key.
 * All loaders need the -installer suffix.
 */
function _toCraftyLoader(raw) {
  const s = (raw || '').toLowerCase();
  if (s.includes('neo'))    return 'neoforge-installer';
  if (s.includes('fabric')) return 'fabric-installer';
  if (s.includes('quilt'))  return 'quilt-installer';
  return 'forge-installer';
}

function onFileChange() {
  const sel = document.getElementById('iFile');
  const opt = sel.options[sel.selectedIndex];
  if (!opt || !opt.value) return;
  const mc       = opt.dataset.mc     || '';
  const loader   = opt.dataset.loader || 'forge-installer';
  const isServer = opt.dataset.server === '1';
  if (mc) document.getElementById('iMcVer').value = mc;
  const craftyLoader = _toCraftyLoader(loader);
  document.getElementById('iLoader').value = craftyLoader;
  const hint = document.getElementById('fileHint');
  if (isServer) {
    hint.className   = 'file-hint server-pack-hint';
    hint.textContent = `✅ Server Pack selected · MC ${mc} · ${craftyLoader}`;
  } else {
    hint.className   = 'file-hint';
    hint.textContent = mc ? `MC ${mc} · ${craftyLoader}` : craftyLoader;
  }
}

function closeModal() {
  document.getElementById('installModal').classList.remove('open');
}

async function doInstall() {
  const fileSelect = document.getElementById('iFile');
  const fileId     = Number(fileSelect.value);
  if (!fileId) { toast('Please select a file first.', 'err'); return; }

  const payload = {
    server_name: document.getElementById('iName').value.trim() || activePack.name,
    mc_version:  document.getElementById('iMcVer').value.trim() || '1.20.1',
    mod_loader:  document.getElementById('iLoader').value,
    port:        Number(document.getElementById('iPort').value),
    mem_min:     Number(document.getElementById('iMinRam').value),
    mem_max:     Number(document.getElementById('iMaxRam').value),
    mod_id:      activePack.id,
    file_id:     fileId,
  };

  const btn = document.getElementById('installBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⧗</span> Creating server…';
  setProgress('Phase 1/3 — Crafty is creating the server instance…', 15);

  try {
    const result = await api('/api/servers/create', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });

    if (result.modpack_installed) {
      setProgress(`Phase 3/3 — Done! ${result.files_extracted} files extracted.`, 100);
      toast(`✅ "${payload.server_name}" deployed with modpack (${result.files_extracted} files)!`, 'ok');
    } else if (result.status === 'created') {
      setProgress('Done — vanilla/loader server created.', 100);
      toast(`✅ "${payload.server_name}" created (no modpack zip installed).`, 'ok');
    } else {
      setProgress('Partial — check warnings.', 80);
      toast(`⚠️ ${result.warning || 'Server created with warnings.'}`, 'info');
    }
    closeModal();
    setTimeout(loadServers, 2000);
  } catch(e) {
    setProgress('Failed.', 0);
    toast(`❌ Deploy failed: ${e.message}`, 'err');
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12l7 7 7-7"/></svg> Install to Crafty';
  }
}

/* -- keyboard shortcuts -- */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.activeElement === document.getElementById('searchInput')) doSearch();
});

/* -- boot -- */
loadConfig();
loadServers();
doSearch();
</script>
