<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crafty Modpack Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>body{font-family:'Satoshi',sans-serif;background:#171614;color:#cdccca;margin:0} .wrap{max-width:1280px;margin:auto;padding:24px} .top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:12px}.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#4f98a3,#7db5bc);display:grid;place-items:center;color:white;font-weight:700}.grid{display:grid;grid-template-columns:320px 1fr;gap:20px}.panel{background:#1c1b19;border:1px solid #393836;border-radius:16px;padding:18px}.input,.select,.btn{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #393836;background:#201f1d;color:#cdccca}.btn{background:#4f98a3;color:#171614;border:none;font-weight:700;cursor:pointer}.btn.secondary{background:#22211f;color:#cdccca;border:1px solid #393836}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}.card{background:#1c1b19;border:1px solid #393836;border-radius:16px;overflow:hidden}.thumb{aspect-ratio:16/9;background:#22211f;width:100%;object-fit:cover}.content{padding:14px;display:grid;gap:10px}.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(79,152,163,.16);color:#4f98a3;font-size:.82rem;font-weight:700}.server-list{display:grid;gap:12px}.server-item{padding:14px;border:1px solid #393836;border-radius:14px;background:#201f1d;display:flex;justify-content:space-between;gap:10px;align-items:center}.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:20px}.modal.open{display:flex}.modal-card{width:min(760px,100%);background:#1c1b19;border:1px solid #393836;border-radius:20px;padding:20px;display:grid;gap:16px}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.small{font-size:.86rem;color:#8c8a86}@media (max-width:900px){.grid,.two{grid-template-columns:1fr}}</style>
</head>
<body><div class="wrap"><div class="top"><div class="brand"><div class="logo">CM</div><div><h1 style="margin:0">Crafty Modpack Manager</h1><div class="small">Browse CurseForge packs and spawn Crafty servers like a self-hosted game panel.</div></div></div><button class="btn secondary" id="refreshBtn" style="width:auto">Refresh servers</button></div><div class="grid"><div style="display:grid;gap:20px"><div class="panel"><h3>Discover modpacks</h3><input id="searchInput" class="input" placeholder="Search modpacks"><div style="height:10px"></div><input id="mcVersion" class="input" placeholder="Minecraft version, e.g. 1.20.1"><div style="height:10px"></div><button class="btn" id="searchBtn">Search CurseForge</button></div><div class="panel"><h3>Crafty status</h3><div id="configBox" class="small">Loading configuration…</div></div><div class="panel"><h3>Active servers</h3><div id="servers" class="server-list"></div></div></div><div class="panel"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap"><div><h3 style="margin:0">Modpack catalog</h3><div class="small">Popular CurseForge server packs and installable files.</div></div><span id="resultCount" class="small">No results</span></div><div id="results" class="cards"></div></div></div></div><div class="modal" id="installModal"><div class="modal-card"><div><h2 id="modalTitle" style="margin:0 0 6px 0">Install modpack</h2><div id="modalMeta" class="small"></div></div><div class="two"><input id="serverName" class="input" placeholder="Server name"><select id="modloader" class="select"><option>forge</option><option>fabric</option><option>neoforge</option><option>quilt</option></select><input id="serverMcVersion" class="input" placeholder="Minecraft version"><input id="serverPort" class="input" type="number" value="25565"><input id="minRam" class="input" type="number" value="2048"><input id="maxRam" class="input" type="number" value="6144"></div><select id="fileSelect" class="select"></select><div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap"><button class="btn secondary" id="cancelModal" style="width:auto">Cancel</button><button class="btn" id="installBtn" style="width:auto">Create Crafty server</button></div></div></div><script>
let selectedPack=null,selectedFiles=[];async function api(path,options={}){const r=await fetch(path,options);return await r.json()} function safe(v,d='—'){return v??d}
async function loadConfig(){const c=await api('/api/config');document.getElementById('configBox').innerHTML=`Crafty URL: <b>${c.crafty_url}</b><br>Crafty token: <b>${c.crafty_configured?'configured':'missing'}</b><br>CurseForge key: <b>${c.curseforge_configured?'configured':'missing'}</b>`}
async function loadServers(){const el=document.getElementById('servers');el.innerHTML='Loading…';try{const data=await api('/api/servers');const items=data.data||data.servers||data||[];if(!Array.isArray(items)||!items.length){el.innerHTML='No servers found in Crafty yet.';return}el.innerHTML=items.map(s=>`<div class="server-item"><div><div><b>${safe(s.server_name||s.name)}</b></div><div class="small">ID: ${safe(s.server_id||s.id)} · Type: ${safe(s.type||s.server_type)}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn secondary" style="width:auto" onclick="serverAction('${safe(s.server_id||s.id,'')}','start')">Start</button><button class="btn secondary" style="width:auto" onclick="serverAction('${safe(s.server_id||s.id,'')}','stop')">Stop</button></div></div>`).join('')}catch(e){el.innerHTML='Could not load servers from Crafty.'}}
async function serverAction(id,action){if(!id)return;await api(`/api/servers/${id}/action/${action}`,{method:'POST'});await loadServers()}
async function searchModpacks(){const q=document.getElementById('searchInput').value.trim();const mc=document.getElementById('mcVersion').value.trim();const box=document.getElementById('results');box.innerHTML='Searching CurseForge…';try{const data=await api(`/api/modpacks/search?q=${encodeURIComponent(q)}&mc_version=${encodeURIComponent(mc)}`);const items=data.data||[];document.getElementById('resultCount').textContent=`${items.length} results`;if(!items.length){box.innerHTML='No modpacks matched your query.';return}box.innerHTML=items.map(pack=>{const img=pack.logo?.thumbnailUrl||pack.logo?.url||'';const summary=(pack.summary||'No description').slice(0,140);return `<div class="card">${img?`<img class="thumb" src="${img}" alt="${pack.name}" loading="lazy">`:`<div class="thumb"></div>`}<div class="content"><div class="badge">${safe(pack.latestFilesIndexes?.[0]?.modLoader,'modpack')}</div><div style="font-size:1.1rem;font-weight:700">${pack.name}</div><div class="small">${summary}</div><div class="small">Downloads: ${pack.downloadCount||0}</div><button class="btn" onclick='openInstall(${pack.id}, ${JSON.stringify("" )}); this.remove()'>Select below</button><button class="btn secondary" style="margin-top:6px" onclick="openPack(${pack.id}, ${JSON.stringify(pack.name)})">Install in Crafty</button></div></div>`}).join('')}catch(e){box.innerHTML='Search failed. Check your CurseForge API key.'}}
async function openPack(id,name){selectedPack={id,name};document.getElementById('modalTitle').textContent=`Install ${name}`;document.getElementById('serverName').value=name;document.getElementById('installModal').classList.add('open');document.getElementById('fileSelect').innerHTML='<option>Loading files…</option>';const data=await api(`/api/modpacks/${id}/files`);selectedFiles=data.data||[];document.getElementById('fileSelect').innerHTML=selectedFiles.slice(0,50).map(f=>`<option value="${f.id}">${f.displayName||f.fileName}</option>`).join('')||'<option value="">No files found</option>';const first=selectedFiles[0];document.getElementById('serverMcVersion').value=(first?.gameVersions||[]).find(v=>/^\d+\.\d+/.test(v))||'';const lg=(first?.fileName||'').toLowerCase();document.getElementById('modloader').value=lg.includes('fabric')?'fabric':(lg.includes('neo')?'neoforge':'forge')}
async function installSelected(){const payload={modpack_id:selectedPack.id,modpack_file_id:Number(document.getElementById('fileSelect').value),server_name:document.getElementById('serverName').value.trim(),modloader:document.getElementById('modloader').value,mc_version:document.getElementById('serverMcVersion').value.trim(),port:Number(document.getElementById('serverPort').value),min_ram:Number(document.getElementById('minRam').value),max_ram:Number(document.getElementById('maxRam').value)};const btn=document.getElementById('installBtn');btn.textContent='Creating…';btn.disabled=true;try{await api('/api/servers/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});alert('Crafty response received. Check your Crafty panel for creation progress.');document.getElementById('installModal').classList.remove('open');await loadServers()}catch(e){alert('Server creation failed.')}finally{btn.textContent='Create Crafty server';btn.disabled=false}}
document.getElementById('searchBtn').addEventListener('click',searchModpacks);document.getElementById('refreshBtn').addEventListener('click',loadServers);document.getElementById('cancelModal').addEventListener('click',()=>document.getElementById('installModal').classList.remove('open'));document.getElementById('installBtn').addEventListener('click',installSelected);window.serverAction=serverAction;loadConfig();loadServers();searchModpacks();
</script></body></html>
